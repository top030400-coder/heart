<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>✦ 하츠 Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Gowun+Dodum&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../style.css">
  <style>
    .login-overlay { position: fixed; inset: 0; background: var(--ice-bg); display: flex; align-items: center; justify-content: center; z-index: 999; }
    .login-box { background: #fff; border-radius: var(--radius-lg); border: 1px solid var(--ice-light); box-shadow: var(--shadow-hover); padding: 40px 36px; text-align: center; width: 320px; }
    .login-title { font-family: var(--serif); font-size: 28px; font-weight: 700; color: var(--ice-ink); margin-bottom: 6px; }
    .login-sub { font-size: 13px; color: var(--silver); margin-bottom: 22px; }
    .login-err { color: #e05; font-size: 13px; margin-top: 10px; min-height: 18px; }
    .tabs { display: flex; gap: 4px; background: var(--ice-soft); border-radius: var(--radius-md); padding: 5px; flex-wrap: wrap; }
    .tab-btn { flex: 1; padding: 10px 6px; border: none; background: transparent; border-radius: var(--radius-sm); font-size: 12px; font-weight: 600; color: var(--silver); cursor: pointer; transition: all var(--transition); min-width: 56px; white-space: nowrap; }
    .tab-btn.active { background: #fff; color: var(--ice-deep); box-shadow: var(--shadow); }
    .tab-panel { display: none; }
    .tab-panel.active { display: flex; flex-direction: column; gap: 16px; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .form-grid .full { grid-column: 1 / -1; }
    .delete-btn { background: none; border: none; cursor: pointer; color: var(--silver-lt); font-size: 16px; padding: 4px 8px; border-radius: 6px; transition: color var(--transition); }
    .delete-btn:hover { color: #e05; }
    .avatar-preview { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 3px solid var(--ice-light); display: none; }
    .save-row { display: flex; justify-content: flex-end; }
  </style>
</head>
<body>

<div class="login-overlay" id="loginOverlay">
  <div class="login-box">
    <div class="login-title">✦ Admin</div>
    <div class="login-sub">관리자 비밀번호를 입력하세요</div>
    <input class="input" type="password" id="pwInput" placeholder="비밀번호" onkeydown="if(event.key==='Enter') tryLogin()" style="margin-bottom:10px;text-align:center">
    <button class="btn btn-primary" style="width:100%" onclick="tryLogin()">입장 ✦</button>
    <div class="login-err" id="loginErr"></div>
  </div>
</div>

<div class="container" id="adminBody" style="display:none">
  <div class="page-title">관리자 페이지</div>
  <div class="page-subtitle">수정 후 저장하면 바로 반영돼요 ✦</div>

  <div class="card" style="padding:8px">
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('profile',this)">✦ 프로필</button>
      <button class="tab-btn" onclick="switchTab('notice',this)">📢 공지</button>
      <button class="tab-btn" onclick="switchTab('schedule',this)">📅 일정</button>
      <button class="tab-btn" onclick="switchTab('work',this)">⚡ 업보</button>
      <button class="tab-btn" onclick="switchTab('diary',this)">📝 일기</button>
    </div>
  </div>

  <!-- ===== 프로필 ===== -->
  <div class="tab-panel active" id="tab-profile">
    <div class="card">
      <div class="card-title">🖼 프로필 사진</div>
      <div class="form-field"><label class="input-label">이미지 파일 (자동 압축)</label><input type="file" id="avatar-file" accept="image/*" class="input" onchange="previewUpload('avatar-file','avatar-preview','avatar-upload-btn')"></div>
      <div style="display:flex;gap:14px;align-items:center;margin-top:8px">
        <img id="avatar-preview" class="avatar-preview">
        <button class="btn btn-primary" id="avatar-upload-btn" onclick="uploadAvatar()" style="display:none">업로드 & 저장 ✦</button>
      </div>
      <div style="margin-top:14px;padding-top:14px;border-top:1px solid var(--ice-light)">
        <div style="font-size:11px;color:var(--silver);margin-bottom:8px">현재 프로필 사진</div>
        <img id="current-avatar" style="width:60px;height:60px;border-radius:50%;object-fit:cover;border:2px solid var(--ice-light);display:none">
        <span id="no-avatar" style="font-size:12px;color:var(--silver)">없음</span>
      </div>
    </div>

    <div class="card">
      <div class="card-title">✦ 한마디 & 하고픈 말</div>
      <div class="form-field"><label class="input-label">제목 옆 한줄</label><input class="input" id="f-head-sub" type="text" placeholder="예: 오늘은 노래방송!"></div>
      <div class="form-field"><label class="input-label">하단 이름표 (예: HATZ)</label><input class="input" id="f-name-badge" type="text"></div>
      <div class="form-field"><label class="input-label">오늘의 한마디 (줄바꿈=엔터)</label><textarea class="input" id="f-quote" rows="3"></textarea></div>
      <div class="form-field"><label class="input-label">하고픈 말</label><textarea class="input" id="f-msg" rows="3"></textarea></div>
      <div class="save-row"><button class="btn btn-primary" onclick="saveProfile()">저장 ✦</button></div>
    </div>

    <div class="card">
      <div class="card-title">✦ 소개 정보</div>
      <div class="form-grid">
        <div class="form-field"><label class="input-label">이름</label><input class="input" id="f-info-name" type="text"></div>
        <div class="form-field"><label class="input-label">생일</label><input class="input" id="f-info-birth" type="text"></div>
        <div class="form-field"><label class="input-label">키</label><input class="input" id="f-info-height" type="text"></div>
        <div class="form-field"><label class="input-label">MBTI</label><input class="input" id="f-info-mbti" type="text"></div>
        <div class="form-field"><label class="input-label">숲 데뷔</label><input class="input" id="f-info-debut" type="text"></div>
        <div class="form-field"><label class="input-label">한마디로</label><input class="input" id="f-info-catchphrase" type="text"></div>
        <div class="form-field full"><label class="input-label">성격 태그 (쉼표 구분)</label><input class="input" id="f-info-tags" type="text"></div>
      </div>
      <div class="save-row"><button class="btn btn-primary" onclick="saveProfile()">저장 ✦</button></div>
    </div>

    <div class="card">
      <div class="card-title">✦ 방송 시간</div>
      <div class="form-field"><label class="input-label">방송 요일 (켜진 요일, 일=0 ~ 토=6, 쉼표)</label><input class="input" id="f-days" type="text" placeholder="0,1,2,3,5,6"></div>
      <div class="form-grid">
        <div class="form-field full"><label class="input-label">평일 시간</label><input class="input" id="f-time-weekday" type="text"></div>
        <div class="form-field full"><label class="input-label">주말 시간</label><input class="input" id="f-time-weekend" type="text"></div>
        <div class="form-field full"><label class="input-label">휴방</label><input class="input" id="f-time-off" type="text"></div>
      </div>
      <div class="save-row"><button class="btn btn-primary" onclick="saveProfile()">저장 ✦</button></div>
    </div>

    <div class="card">
      <div class="card-title">✦ 팬 캐릭터</div>
      <div class="form-field"><label class="input-label">캐릭터 이미지 (자동 압축)</label><input type="file" id="fan-file" accept="image/*" class="input" onchange="previewUpload('fan-file','fan-preview','fan-upload-btn')"></div>
      <div style="display:flex;gap:14px;align-items:center;margin-top:8px;margin-bottom:8px">
        <img id="fan-preview" class="avatar-preview" style="border-radius:14px">
        <button class="btn btn-primary" id="fan-upload-btn" onclick="uploadFan()" style="display:none">업로드 & 저장 ✦</button>
      </div>
      <div class="form-field"><label class="input-label">팬 이름</label><input class="input" id="f-fan-name" type="text"></div>
      <div class="form-field"><label class="input-label">팬닉</label><input class="input" id="f-fan-nick" type="text"></div>
      <div class="save-row"><button class="btn btn-primary" onclick="saveProfile()">저장 ✦</button></div>
    </div>

    <div class="card">
      <div class="card-title">✦ 좋아 / 싫어 · TMI</div>
      <div class="form-grid">
        <div class="form-field"><label class="input-label">좋아 1</label><input class="input" id="f-like1" type="text"></div>
        <div class="form-field"><label class="input-label">좋아 2</label><input class="input" id="f-like2" type="text"></div>
        <div class="form-field"><label class="input-label">좋아 3</label><input class="input" id="f-like3" type="text"></div>
        <div class="form-field"><label class="input-label">좋아 4</label><input class="input" id="f-like4" type="text"></div>
        <div class="form-field"><label class="input-label">싫어 1</label><input class="input" id="f-dislike1" type="text"></div>
        <div class="form-field"><label class="input-label">싫어 2</label><input class="input" id="f-dislike2" type="text"></div>
        <div class="form-field full"><label class="input-label">좋아하는 음식</label><input class="input" id="f-tmi-food" type="text"></div>
        <div class="form-field full"><label class="input-label">요즘 듣는 노래</label><input class="input" id="f-tmi-song" type="text"></div>
        <div class="form-field full"><label class="input-label">최근 본 것</label><input class="input" id="f-tmi-book" type="text"></div>
      </div>
      <div class="save-row"><button class="btn btn-primary" onclick="saveProfile()">저장 ✦</button></div>
    </div>

    <div class="card">
      <div class="card-title">📌 관련 링크</div>
      <div class="form-field"><label class="input-label">SOOP URL</label><input class="input" id="f-link-soop" type="url" placeholder="https://"></div>
      <div class="form-field"><label class="input-label">YouTube URL</label><input class="input" id="f-link-youtube" type="url" placeholder="https://"></div>
      <div class="form-field"><label class="input-label">팬카페 URL</label><input class="input" id="f-link-fancafe" type="url" placeholder="https://"></div>
      <div class="form-field"><label class="input-label">하츠위키 URL</label><input class="input" id="f-link-wiki" type="url" placeholder="https://"></div>
      <div class="form-field"><label class="input-label">팬심 URL</label><input class="input" id="f-link-fancim" type="url" placeholder="https://"></div>
      <div class="form-field"><label class="input-label">X(트위터) URL</label><input class="input" id="f-link-x" type="url" placeholder="https://"></div>
      <div class="save-row"><button class="btn btn-primary" onclick="saveProfile()">저장 ✦</button></div>
    </div>
  </div>

  <!-- ===== 공지 ===== -->
  <div class="tab-panel" id="tab-notice">
    <div class="card">
      <div class="card-title">공지 추가</div>
      <div class="form-field"><label class="input-label">제목 *</label><input class="input" id="noti-title"></div>
      <div class="form-field"><label class="input-label">내용</label><textarea class="input" id="noti-content" rows="4"></textarea></div>
      <div class="form-field"><label class="input-label">이미지 (선택 · 자동 압축)</label><input type="file" id="noti-image" accept="image/*" class="input"></div>
      <div class="form-field"><label style="font-size:13px;color:var(--text-mid)"><input type="checkbox" id="noti-pin"> 📌 고정 공지</label></div>
      <div class="save-row"><button class="btn btn-primary" onclick="addNotice()">+ 추가</button></div>
    </div>
    <div class="card">
      <div class="card-title">등록된 공지</div>
      <div class="table-wrap"><table><thead><tr><th>제목</th><th>고정</th><th>날짜</th><th>삭제</th></tr></thead>
      <tbody id="noti-list"><tr><td colspan="4"><div class="spinner"></div></td></tr></tbody></table></div>
    </div>
  </div>

  <!-- ===== 일정 ===== -->
  <div class="tab-panel" id="tab-schedule">
    <div class="card">
      <div class="card-title">일정 추가</div>
      <div class="form-grid">
        <div class="form-field full"><label class="input-label">제목 *</label><input class="input" id="sch-title"></div>
        <div class="form-field"><label class="input-label">날짜 *</label><input class="input" id="sch-date" type="date"></div>
        <div class="form-field"><label class="input-label">시간</label><input class="input" id="sch-time" placeholder="오후 8시"></div>
        <div class="form-field"><label class="input-label">유형</label>
          <select class="input" id="sch-type"><option value="일반">일반</option><option value="특별">특별</option><option value="콜라보">콜라보</option><option value="휴방">휴방</option></select>
        </div>
        <div class="form-field full"><label class="input-label">메모</label><input class="input" id="sch-note"></div>
      </div>
      <div class="save-row"><button class="btn btn-primary" onclick="addSchedule()">+ 추가</button></div>
    </div>
    <div class="card">
      <div class="card-title">등록된 일정</div>
      <div class="table-wrap"><table><thead><tr><th>날짜</th><th>제목</th><th>유형</th><th>삭제</th></tr></thead>
      <tbody id="sch-list"><tr><td colspan="4"><div class="spinner"></div></td></tr></tbody></table></div>
    </div>
  </div>

  <!-- ===== 업보 ===== -->
  <div class="tab-panel" id="tab-work">
    <div class="card">
      <div class="card-title">업보 추가</div>
      <div class="form-grid">
        <div class="form-field"><label class="input-label">닉네임 *</label><input class="input" id="work-nick"></div>
        <div class="form-field"><label class="input-label">날짜</label><input class="input" id="work-date" type="date"></div>
        <div class="form-field full"><label class="input-label">내용 *</label><input class="input" id="work-title"></div>
        <div class="form-field full"><label class="input-label">설명</label><textarea class="input" id="work-desc" rows="2"></textarea></div>
        <div class="form-field"><label class="input-label">카테고리</label><input class="input" id="work-category"></div>
      </div>
      <div class="save-row"><button class="btn btn-primary" onclick="addWork()">+ 추가</button></div>
    </div>
    <div class="card">
      <div class="card-title">등록된 업보</div>
      <div class="table-wrap"><table><thead><tr><th>닉네임</th><th>내용</th><th>카테고리</th><th>삭제</th></tr></thead>
      <tbody id="work-list"><tr><td colspan="4"><div class="spinner"></div></td></tr></tbody></table></div>
    </div>
  </div>

  <!-- ===== 일기 ===== -->
  <div class="tab-panel" id="tab-diary">
    <div class="card">
      <div class="card-title">일기 추가</div>
      <div class="form-grid">
        <div class="form-field"><label class="input-label">제목 *</label><input class="input" id="diary-title"></div>
        <div class="form-field"><label class="input-label">기분</label>
          <select class="input" id="diary-mood"><option>😊</option><option>😄</option><option>🥰</option><option>😢</option><option>😡</option><option>🤔</option><option>😴</option><option>🎉</option><option>💪</option><option>✦</option></select>
        </div>
        <div class="form-field full"><label class="input-label">내용</label><textarea class="input" id="diary-content" rows="5"></textarea></div>
        <div class="form-field full"><label class="input-label">이미지 (선택 · 자동 압축)</label><input type="file" id="diary-image" accept="image/*" class="input"></div>
        <div class="form-field"><label class="input-label">날짜</label><input class="input" id="diary-date" type="date"></div>
      </div>
      <div class="save-row"><button class="btn btn-primary" onclick="addDiary()">+ 추가</button></div>
    </div>
    <div class="card">
      <div class="card-title">등록된 일기</div>
      <div class="table-wrap"><table><thead><tr><th>날짜</th><th>기분</th><th>제목</th><th>삭제</th></tr></thead>
      <tbody id="diary-list"><tr><td colspan="4"><div class="spinner"></div></td></tr></tbody></table></div>
    </div>
  </div>

</div>
<footer>© 2026 하츠 관리자 ✦</footer>
<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="../supabase.js"></script>
<script>
  const ADMIN_PASSWORD = '1234';  // ← 원하는 비밀번호로 바꾸세요

  const profileKeys = [
    'head-sub','name-badge','quote','msg',
    'info-name','info-birth','info-height','info-mbti','info-debut','info-catchphrase','info-tags',
    'days','time-weekday','time-weekend','time-off',
    'fan-name','fan-nick',
    'like1','like2','like3','like4','dislike1','dislike2',
    'tmi-food','tmi-song','tmi-book',
    'link-soop','link-youtube','link-fancafe','link-wiki','link-fancim','link-x'
  ];

  function tryLogin() {
    if (document.getElementById('pwInput').value === ADMIN_PASSWORD) {
      document.getElementById('loginOverlay').style.display = 'none';
      document.getElementById('adminBody').style.display = 'flex';
      loadProfileFields(); loadNotice(); loadSchedule(); loadWork(); loadDiary();
    } else {
      document.getElementById('loginErr').textContent = '비밀번호가 틀렸어요 >﹏<';
    }
  }
  function switchTab(name, btn) {
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-' + name).classList.add('active');
    btn.classList.add('active');
  }

  // ── 프로필 ──
  async function getProfileData() {
    let saved = {};
    try {
      const { data: rows } = await db.from('profile').select('data').eq('id', 1);
      if (rows && rows.length > 0 && rows[0].data) saved = rows[0].data;
    } catch (e) {}
    return saved;
  }
  async function loadProfileFields() {
    const saved = await getProfileData();
    profileKeys.forEach(k => { const el = document.getElementById('f-' + k); if (el) el.value = saved[k] || ''; });
    showCurrentAvatar(saved.avatar || '');
  }
  async function saveProfile() {
    const saved = await getProfileData();
    profileKeys.forEach(k => { const el = document.getElementById('f-' + k); if (el) saved[k] = el.value; });
    const { error } = await db.from('profile').upsert({ id: 1, data: saved });
    if (error) { showToast('❌ 저장 실패: ' + error.message); return; }
    showToast('✅ 저장됐어요!');
  }
  function showCurrentAvatar(url) {
    const cur = document.getElementById('current-avatar');
    const none = document.getElementById('no-avatar');
    if (url) { cur.src = url; cur.style.display = 'block'; none.style.display = 'none'; }
  }
  function previewUpload(fileId, previewId, btnId) {
    const file = document.getElementById(fileId).files[0];
    if (!file) return;
    const p = document.getElementById(previewId);
    p.src = URL.createObjectURL(file); p.style.display = 'block';
    document.getElementById(btnId).style.display = 'inline-flex';
  }
  async function uploadAvatar() {
    const file = document.getElementById('avatar-file').files[0];
    if (!file) return;
    showToast('🖼 업로드 중...');
    const url = await uploadImage(file, 'profile');
    if (!url) { showToast('❌ 업로드 실패'); return; }
    const saved = await getProfileData();
    saved.avatar = url + '?t=' + Date.now();
    await db.from('profile').upsert({ id: 1, data: saved });
    showCurrentAvatar(saved.avatar);
    showToast('✅ 프로필 사진 저장!');
  }
  async function uploadFan() {
    const file = document.getElementById('fan-file').files[0];
    if (!file) return;
    showToast('🖼 업로드 중...');
    const url = await uploadImage(file, 'fan');
    if (!url) { showToast('❌ 업로드 실패'); return; }
    const saved = await getProfileData();
    saved['fan-img'] = url + '?t=' + Date.now();
    await db.from('profile').upsert({ id: 1, data: saved });
    showToast('✅ 팬 캐릭터 저장!');
  }

  // ── 공지 ──
  async function loadNotice() {
    const data = await fetchAll('notice', { order: 'created_at', asc: false });
    const t = document.getElementById('noti-list');
    if (!data.length) { t.innerHTML = '<tr><td colspan="4" style="text-align:center;color:var(--silver-lt);padding:20px">없음</td></tr>'; return; }
    t.innerHTML = data.map(n => `<tr><td>${n.title}</td><td>${n.pinned?'📌':'-'}</td><td>${new Date(n.created_at).toLocaleDateString()}</td><td><button class="delete-btn" onclick="del('notice',${n.id},loadNotice)">🗑</button></td></tr>`).join('');
  }
  async function addNotice() {
    const title = document.getElementById('noti-title').value.trim();
    if (!title) { showToast('❗ 제목 필수!'); return; }
    let image_url = null;
    const f = document.getElementById('noti-image').files[0];
    if (f) { showToast('🖼 이미지 업로드 중...'); image_url = await uploadImage(f, 'notice'); if (!image_url) { showToast('❌ 이미지 실패'); return; } }
    const ok = await insertRow('notice', { title, content: document.getElementById('noti-content').value, pinned: document.getElementById('noti-pin').checked, image_url });
    if (ok) { showToast('✅ 추가!'); ['noti-title','noti-content','noti-image'].forEach(id=>document.getElementById(id).value=''); document.getElementById('noti-pin').checked=false; loadNotice(); }
    else showToast('❌ 실패');
  }

  // ── 일정 ──
  async function loadSchedule() {
    const data = await fetchAll('schedule', { order: 'date', asc: true });
    const t = document.getElementById('sch-list');
    if (!data.length) { t.innerHTML = '<tr><td colspan="4" style="text-align:center;color:var(--silver-lt);padding:20px">없음</td></tr>'; return; }
    t.innerHTML = data.map(s => `<tr><td>${s.date}</td><td>${s.title}</td><td><span class="badge badge-ice">${s.type||'-'}</span></td><td><button class="delete-btn" onclick="del('schedule',${s.id},loadSchedule)">🗑</button></td></tr>`).join('');
  }
  async function addSchedule() {
    const title = document.getElementById('sch-title').value.trim();
    const date = document.getElementById('sch-date').value;
    if (!title||!date) { showToast('❗ 제목/날짜 필수!'); return; }
    const ok = await insertRow('schedule', { title, date, time: document.getElementById('sch-time').value, type: document.getElementById('sch-type').value, note: document.getElementById('sch-note').value });
    if (ok) { showToast('✅ 추가!'); ['sch-title','sch-date','sch-time','sch-note'].forEach(id=>document.getElementById(id).value=''); loadSchedule(); }
    else showToast('❌ 실패');
  }

  // ── 업보 ──
  async function loadWork() {
    const data = await fetchAll('work', { order: 'created_at', asc: false });
    const t = document.getElementById('work-list');
    if (!data.length) { t.innerHTML = '<tr><td colspan="4" style="text-align:center;color:var(--silver-lt);padding:20px">없음</td></tr>'; return; }
    t.innerHTML = data.map(w => `<tr><td>${w.nickname||'-'}</td><td>${w.title}</td><td>${w.category||'-'}</td><td><button class="delete-btn" onclick="del('work',${w.id},loadWork)">🗑</button></td></tr>`).join('');
  }
  async function addWork() {
    const nick = document.getElementById('work-nick').value.trim();
    const title = document.getElementById('work-title').value.trim();
    if (!nick||!title) { showToast('❗ 닉네임/내용 필수!'); return; }
    const ok = await insertRow('work', { nickname: nick, title, description: document.getElementById('work-desc').value, category: document.getElementById('work-category').value, event_date: document.getElementById('work-date').value });
    if (ok) { showToast('✅ 추가!'); ['work-nick','work-title','work-desc','work-category','work-date'].forEach(id=>document.getElementById(id).value=''); loadWork(); }
    else showToast('❌ 실패');
  }

  // ── 일기 ──
  async function loadDiary() {
    const data = await fetchAll('diary', { order: 'diary_date', asc: false });
    const t = document.getElementById('diary-list');
    if (!data.length) { t.innerHTML = '<tr><td colspan="4" style="text-align:center;color:var(--silver-lt);padding:20px">없음</td></tr>'; return; }
    t.innerHTML = data.map(d => `<tr><td>${d.diary_date||'-'}</td><td>${d.mood||''}</td><td>${d.title}</td><td><button class="delete-btn" onclick="del('diary',${d.id},loadDiary)">🗑</button></td></tr>`).join('');
  }
  async function addDiary() {
    const title = document.getElementById('diary-title').value.trim();
    if (!title) { showToast('❗ 제목 필수!'); return; }
    let image_url = null;
    const f = document.getElementById('diary-image').files[0];
    if (f) { showToast('🖼 이미지 업로드 중...'); image_url = await uploadImage(f, 'diary'); if (!image_url) { showToast('❌ 이미지 실패'); return; } }
    const ok = await insertRow('diary', { title, content: document.getElementById('diary-content').value, mood: document.getElementById('diary-mood').value, diary_date: document.getElementById('diary-date').value, image_url });
    if (ok) { showToast('✅ 추가!'); ['diary-title','diary-content','diary-date','diary-image'].forEach(id=>document.getElementById(id).value=''); loadDiary(); }
    else showToast('❌ 실패');
  }

  async function del(table, id, fn) {
    if (!confirm('정말 삭제?')) return;
    const ok = await deleteRow(table, id);
    if (ok) { showToast('🗑 삭제!'); fn(); } else showToast('❌ 실패');
  }
</script>
</body>
</html>
